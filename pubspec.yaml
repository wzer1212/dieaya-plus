name: dieaya_user
description: "Dieaya User"

publish_to: 'none'

version: 1.0.60+110

environment:
  sdk: ^3.5.3


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  loading_animation_widget: ^1.3.0
  google_fonts: ^8.0.2
  get: ^4.7.2
  shared_preferences: ^2.5.3
#  connectivity_plus: ^5.0.2
  package_info_plus: ^8.0.3
  url_launcher: ^6.3.1
  flutter_svg: ^2.1.0
  get_storage: ^2.1.1
  smooth_page_indicator: ^1.2.1
  carousel_slider: ^5.1.1
  lucide_icons: ^0.257.0
  pinput: ^5.0.1
#  share_plus: ^11.0.0
  dio: ^5.8.0+1
  dropdown_button2: ^2.3.9
  restart_app: ^1.3.2
  flutter_html: ^3.0.0-beta.2
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.9
  flutter_local_notifications: ^19.4.0
  app_links: ^6.4.1
  cached_network_image: ^3.4.1
  permission_handler: ^11.3.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.9.1
  flutter_alice: ^2.0.1
  share_plus: ^12.0.1

dev_dependencies:
  flutter_launcher_icons: "^0.13.1"
#  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon_v.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21
#  adaptive_icon_foreground: "assets/images/icon_v.png"
  adaptive_icon_background: "#ffffff"

  flutter_test:
    sdk: flutter


  flutter_lints: ^4.0.0


flutter:


  uses-material-design: true

  assets:
     - assets/
     - assets/images/
     - assets/svg/
     - assets/svg/profile/
     - assets/svg/social/
     - assets/images/logo.png
     - assets/locales/en.json
     - assets/locales/ar.json
     - assets/images/Rectangle 6.png
     - assets/images/Illustration.png
     - assets/images/Ellipse 14.png
     - assets/images/continerBack.png
     - assets/svg/mynaui_click-solid.svg
     - assets/svg/listview.svg
     - assets/svg/gridview.svg
     - assets/images/jaket.png


