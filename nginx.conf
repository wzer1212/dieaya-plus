# Nginx Configuration for Dieaya Plus - Two Flutter Web Apps
# Location: /etc/nginx/sites-available/site.tcore.site
# Or: /etc/nginx/conf.d/site.tcore.site.conf

server {
    listen 80;
    listen [::]:80;
    server_name site.tcore.site;
    
    # SSL Configuration (uncomment after setting up SSL with Let's Encrypt)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/site.tcore.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/site.tcore.site/privkey.pem;
    
    # Root directory
    root /www/wwwroot/dieaya-plus;
    
    # Character encoding
    charset utf-8;
    
    # ============================================
    # User App - /app
    # ============================================
    location /app/ {
        index index.html index.htm;
        
        # SPA routing - send all requests to index.html except static files
        try_files $uri $uri/ /app/index.html?$query_string;
        
        # Disable caching for index.html
        location /app/index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate, public, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
    
    # ============================================
    # Business App - /businessapp
    # ============================================
    location /businessapp/ {
        index index.html index.htm;
        
        # SPA routing - send all requests to index.html except static files
        try_files $uri $uri/ /businessapp/index.html?$query_string;
        
        # Disable caching for index.html
        location /businessapp/index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate, public, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
    
    # ============================================
    # Root path - redirect to /app
    # ============================================
    location = / {
        return 301 /app/;
    }
    
    # ============================================
    # Static Assets Caching
    # ============================================
    
    # JavaScript files - no cache (Flutter updates main.dart.js frequently)
    location ~* \.dart\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
        add_header Pragma "no-cache";
    }
    
    # WebAssembly files - long cache (stable)
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        types { application/wasm wasm; }
    }
    
    # Service Worker - no cache
    location ~* service_worker\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires -1;
    }
    
    # CSS and fonts - long cache (safe with hash in filename)
    location ~* \.(css|woff|woff2|ttf|eot|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
    }
    
    # Images - moderate cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        add_header Cache-Control "public, max-age=2592000";  # 30 days
        expires 30d;
        add_header Vary "Accept-Encoding";
    }
    
    # JSON files (manifests, etc.) - short cache
    location ~* \.json$ {
        add_header Cache-Control "public, max-age=3600";  # 1 hour
        expires 1h;
    }
    
    # Other static files
    location ~* \.(txt|xml|pdf|zip)$ {
        add_header Cache-Control "public, max-age=86400";  # 1 day
        expires 1d;
    }
    
    # ============================================
    # Compression
    # ============================================
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss application/wasm;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;
    
    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # ============================================
    # Error Pages
    # ============================================
    error_page 404 =200 /app/index.html;
    error_page 500 502 503 504 /50x.html;
    
    # ============================================
    # Deny access to sensitive files
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ============================================
    # Logging
    # ============================================
    access_log /var/log/nginx/site.tcore.site_access.log;
    error_log /var/log/nginx/site.tcore.site_error.log warn;
}

